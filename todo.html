<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>To-Do List</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            background: linear-gradient(to right, #74ebd5, #acb6e5);\n            padding: 20px;\n            margin: 0;\n        }\n        h1 {\n            text-align: center;\n        }\n        .task-container {\n            max-width: 500px;\n            margin: auto;\n        }\n        input[type='text'] {\n            width: 70%;\n            padding: 10px;\n            margin-right: 5px;\n        }\n        button {\n            padding: 10px;\n            cursor: pointer;\n        }\n        ul {\n            list-style-type: none;\n            padding: 0;\n        }\n        li {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            margin: 10px 0;\n            padding: 10px;\n            background: #fff;\n            border-radius: 5px;\n            box-shadow: 0 2px 5px rgba(0,0,0,0.1);\n        }\n        .checkbox {\n            margin-right: 10px;\n        }\n        .completed {\n            text-decoration: line-through;\n            color: gray;\n        }\n    </style>\n</head>\n<body>\n    <h1>To-Do List</h1>\n    <div class=\"task-container\">\n        <input type=\"text\" id=\"task-input\" placeholder=\"Add a new task...\">\n        <button id=\"add-task\">Add</button>\n        <ul id=\"task-list\"></ul>\n        <div>\n            <button id=\"filter-all\">All</button>\n            <button id=\"filter-active\">Active</button>\n            <button id=\"filter-completed\">Completed</button>\n        </div>\n    </div>\n    <script>\n        const taskInput = document.getElementById('task-input');\n        const addTaskButton = document.getElementById('add-task');\n        const taskList = document.getElementById('task-list');\n        const filterAllButton = document.getElementById('filter-all');\n        const filterActiveButton = document.getElementById('filter-active');\n        const filterCompletedButton = document.getElementById('filter-completed');\n        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];\n        let filter = 'all';\n\n        function renderTasks() {\n            taskList.innerHTML = '';\n            tasks.forEach((task, index) => {\n                if ((filter === 'active' && task.completed) || (filter === 'completed' && !task.completed)) return;\n                const li = document.createElement('li');\n                li.className = task.completed ? 'completed' : '';\n                li.innerHTML = `\n                    <input type=\"checkbox\" class=\"checkbox\" ${task.completed ? 'checked' : ''} onchange=\"toggleComplete(${index})\">\n                    ${task.text}\n                    <button onclick=\"editTask(${index})\">Edit</button>\n                    <button onclick=\"deleteTask(${index})\">Delete</button>\n                `;\n                taskList.appendChild(li);\n            });\n        }\n\n        function addTask() {\n            const taskText = taskInput.value.trim();\n            if (taskText) {\n                tasks.push({ text: taskText, completed: false });\n                taskInput.value = '';\n                saveTasks();\n                renderTasks();\n            }\n        }\n\n        function toggleComplete(index) {\n            tasks[index].completed = !tasks[index].completed;\n            saveTasks();\n            renderTasks();\n        }\n\n        function editTask(index) {\n            const newTaskText = prompt('Edit task:', tasks[index].text);\n            if (newTaskText) {\n                tasks[index].text = newTaskText;\n                saveTasks();\n                renderTasks();\n            }\n        }\n\n        function deleteTask(index) {\n            tasks.splice(index, 1);\n            saveTasks();\n            renderTasks();\n        }\n\n        function saveTasks() {\n            localStorage.setItem('tasks', JSON.stringify(tasks));\n        }\n\n        addTaskButton.addEventListener('click', addTask);\n        filterAllButton.addEventListener('click', () => { filter = 'all'; renderTasks(); });\n        filterActiveButton.addEventListener('click', () => { filter = 'active'; renderTasks(); });\n        filterCompletedButton.addEventListener('click', () => { filter = 'completed'; renderTasks(); });\n\n        renderTasks();\n    </script>\n</body>\n</html>\n
